spring:
  datasource:
    url: jdbc:h2:mem:tolink_local;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver

  redis:
    host: localhost
    port: 6379
    username:
    password:
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: 1000ms

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

tolink:
  mq:
    vender: none
  oss:
    service-type: local
    file-root-path: ${user.home}/.tolink/oss
    public-base-url: /api/v1/oss-files/public
  knowledge-file:
    max-size-bytes: 20971520
    internal-base-url: http://localhost:8080
    service-token:
    sse-timeout-ms: 300000
  parse-result:
    stuck:
      default-threshold: 5m
      scan-interval-ms: 60000
      dataset-thresholds: {}

llm:
  api-key:
    secret: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

management:
  health:
    db:
      enabled: false
    redis:
      enabled: false
    rabbit:
      enabled: false
