spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectTimeout=3000&socketTimeout=5000
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: ${DRUID_INITIAL_SIZE:0}
      min-idle: ${DRUID_MIN_IDLE:0}
      max-active: ${DRUID_MAX_ACTIVE:8}
      max-wait: 3000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD}
    database: ${REDIS_DB:0}
    timeout: 2s
    lettuce:
      shutdown-timeout: 100ms
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: 1000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    listener:
      auto-startup: ${KAFKA_LISTENER_AUTO_STARTUP:true}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_SASL_USERNAME}"
        password="${KAFKA_SASL_PASSWORD}";

mybatis-plus:
  configuration:
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.stdout.StdOutImpl}

tolink:
  mq:
    vender: ${TOLINK_MQ_VENDOR:kafka}
    scan-base-packages:
      - com.qingluo
    kafka-auto-create-topics: true
    kafka-topic-partitions: 1
    kafka-topic-replicas: 1
  oss:
    service-type: ${OSS_SERVICE_TYPE:minio}
    file-root-path: ${user.home}/.tolink/oss
    public-base-url: /api/v1/oss-files/public
    minio:
      endpoint: http://${MINIO_ENDPOINT}
      public-bucket-name: ${MINIO_PUBLIC_BUCKET:tolink-rag-docs}
      private-bucket-name: ${MINIO_PRIVATE_BUCKET:tolink-rag-docs}
      access-key: ${MINIO_ACCESS_KEY}
      secret-key: ${MINIO_SECRET_KEY}
    aliyun-oss:
      endpoint: ${ALIYUN_OSS_ENDPOINT:}
      public-bucket-name: ${ALIYUN_OSS_PUBLIC_BUCKET:}
      private-bucket-name: ${ALIYUN_OSS_PRIVATE_BUCKET:}
      access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
  document-file:
    max-size-bytes: 20971520
    internal-base-url: ${DOCUMENT_FILE_INTERNAL_BASE_URL:http://tolink-service:8080}
    service-token: ${DOCUMENT_FILE_SERVICE_TOKEN:}
    sse-timeout-ms: ${DOCUMENT_FILE_SSE_TIMEOUT_MS:300000}
  parse-result:
    stuck:
      # 文件上传解析为用户在线等待场景，超过阈值仍未出终态即视为异常
      default-threshold: ${PARSE_RESULT_STUCK_THRESHOLD:5m}
      scan-interval-ms: ${PARSE_RESULT_STUCK_SCAN_INTERVAL_MS:60000}
      # 按数据集覆盖阈值示例：dataset-thresholds.{datasetId}: 20m（默认空，回落 default-threshold）
      dataset-thresholds: {}

llm:
  api-key:
    secret: ${LLM_SECRET}

logging:
  level:
    com.qingluo.link: ${LOG_LEVEL:debug}

thread-pool:
  document-upload:
    core-pool-size: ${THREAD_POOL_CORE_SIZE:5}
    max-pool-size: ${THREAD_POOL_MAX_SIZE:10}
    queue-capacity: ${THREAD_POOL_QUEUE_CAPACITY:50}
    keep-alive-seconds: ${THREAD_POOL_KEEP_ALIVE_SECONDS:60}
    thread-name-prefix: ${THREAD_POOL_THREAD_NAME_PREFIX:document-file-upload-}

management:
  health:
    db:
      enabled: false
    redis:
      enabled: false
    rabbit:
      enabled: false
