spring:
  application:
    name: tolink-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted

sa-token:
  token-name: satoken
  timeout: 604800
  token-style: uuid
  is-concurrent: true
  is-share: false
  token-mode: uuid

server:
  port: 8080

tolink:
  document-file:
    allowed-suffixes:
      - md
      - markdown
      - pdf
      - docx
      - txt

logging:
  level:
    com.qingluo.link: debug

thread-pool:
  core-pool-size: 5
  max-pool-size: 10
  queue-capacity: 50
  keep-alive-seconds: 60
  thread-name-prefix: document-file-upload-
