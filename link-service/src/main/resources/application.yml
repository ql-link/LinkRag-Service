server:
  port: 8080

spring:
  application:
    name: link-service

  # 数据库配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:3306/tolink_rag_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  # Redis 配置
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
    username: ${REDIS_USERNAME:}
    password: ${REDIS_PASSWORD:}
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.qingluo.link.model.entity
  global-config:
    db-config:
      # 主键类型：ASSIGN_ID = 雪花算法（适配 VARCHAR(36)）
      id-type: assign_id
      # 逻辑删除字段
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# PageHelper 配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# sa-token 配置
sa-token:
  # token 名称
  token-name: satoken
  # token 有效期（秒），7 天 = 604800
  timeout: 604800
  # token 风格：uuid-简短
  token-style: uuid-简短
  # 是否允许 Cookie 携带 token（关闭，强制用 Header）
  is-read-cookie: false
  # 是否允许 Header 携带 token（开启）
  is-read-header: true
  # 是否开启登录，同一用户重复登录行为
  is-concurrent: true
  # 同一账号多地登录时，是否共享 token（false = 互斥）
  is-share: false
  # 是否输出操作日志（生产环境 false）
  is-log: false

# LLM 模块配置
llm:
  api-key:
    # AES-256-GCM 对称加密密钥，64字符十六进制字符串（32字节）
    secret: ${LLM_SECRET:}

# 日志配置
logging:
  level:
    com.qingluo.link: INFO
    com.qingluo.link.core.exception: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"