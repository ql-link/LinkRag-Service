<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" width="1400" height="1000">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", "Microsoft JhengHei", "SimHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <defs>
      <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
      </filter>
    </defs>
  </defs>
  <rect width="1400" height="1000" fill="#ffffff"/>
  <text x="700" y="35" font-size="24" font-weight="600" text-anchor="middle" fill="#111827">toLink-Service 整体架构图</text>
  <text x="25" y="80" font-size="13" font-weight="600" fill="#6b7280">API 层</text>
  <text x="25" y="200" font-size="13" font-weight="600" fill="#6b7280">业务服务层</text>
  <text x="25" y="350" font-size="13" font-weight="600" fill="#6b7280">基础模块</text>
  <text x="25" y="520" font-size="13" font-weight="600" fill="#6b7280">中间件与存储</text>
  <rect x="60" y="60" width="100" height="50" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="110" y="92" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">认证</text>
  <rect x="160" y="60" width="100" height="50" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="210" y="92" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">用户</text>
  <rect x="260" y="60" width="100" height="50" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="310" y="92" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">LLM</text>
  <rect x="360" y="60" width="100" height="50" rx="6" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="410" y="92" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">知识库</text>
  <rect x="460" y="60" width="100" height="50" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="510" y="92" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">交互</text>
  <rect x="560" y="60" width="100" height="50" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="610" y="92" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">内容</text>
  <rect x="660" y="60" width="100" height="50" rx="6" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="710" y="92" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">管理</text>
  <text x="800" y="75" font-size="11" fill="#6b7280">15 Controllers (REST / SSE)</text>
  <rect x="60" y="180" width="140" height="50" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="130" y="212" font-size="12" text-anchor="middle" fill="#111827">DocumentFileService</text>
  <rect x="240" y="180" width="140" height="50" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="310" y="212" font-size="12" text-anchor="middle" fill="#111827">UserService</text>
  <rect x="420" y="180" width="140" height="50" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="490" y="212" font-size="12" text-anchor="middle" fill="#111827">ProviderService</text>
  <rect x="600" y="180" width="140" height="50" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="670" y="212" font-size="12" text-anchor="middle" fill="#111827">ChatService</text>
  <rect x="780" y="180" width="140" height="50" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="850" y="212" font-size="12" text-anchor="middle" fill="#111827">BlogService</text>
  <rect x="960" y="180" width="140" height="50" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="1030" y="212" font-size="12" text-anchor="middle" fill="#111827">CacheService</text>
  <text x="800" y="195" font-size="11" fill="#6b7280">link-service: 服务编排 + 业务逻辑</text>
  <rect x="60" y="330" width="140" height="80" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="130" y="375" font-size="12" text-anchor="middle" font-weight="600" fill="#111827">link-mapper
(MyBatis-Plus)</text>
  <rect x="240" y="330" width="140" height="80" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="310" y="375" font-size="12" text-anchor="middle" font-weight="600" fill="#111827">link-model
(Entity/DTO)</text>
  <rect x="420" y="330" width="140" height="80" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="490" y="375" font-size="12" text-anchor="middle" font-weight="600" fill="#111827">link-core
(异常/认证/工具)</text>
  <rect x="620" y="330" width="140" height="80" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="690" y="375" font-size="12" text-anchor="middle" font-weight="600" fill="#111827">link-components
(mq/oss/redis)</text>
  <text x="820" y="360" font-size="11" fill="#6b7280">基础设施模块</text>
  <rect x="60" y="500" width="120" height="80" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="120" y="545" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">MySQL</text>
  <text x="120" y="565" font-size="11" text-anchor="middle" fill="#6b7280">所有业务数据</text>
  <rect x="220" y="500" width="120" height="80" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="280" y="530" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">Redis</text>
  <text x="280" y="550" font-size="10" text-anchor="middle" fill="#6b7280">缓存</text>
  <text x="280" y="565" font-size="10" text-anchor="middle" fill="#6b7280">(用户/LLM目录)</text>
  <rect x="380" y="500" width="120" height="80" rx="6" fill="#ede9fe" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="440" y="530" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">Kafka</text>
  <text x="440" y="550" font-size="10" text-anchor="middle" fill="#6b7280">消息队列</text>
  <text x="440" y="565" font-size="10" text-anchor="middle" fill="#6b7280">(任务/结果/删除)</text>
  <rect x="540" y="500" width="120" height="80" rx="6" fill="#dbeafe" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="600" y="530" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">MinIO</text>
  <text x="600" y="550" font-size="10" text-anchor="middle" fill="#6b7280">对象存储</text>
  <text x="600" y="565" font-size="10" text-anchor="middle" fill="#6b7280">(原文件/Markdown)</text>
  <rect x="700" y="500" width="150" height="80" rx="6" fill="#fed7aa" stroke="#fdba74" stroke-width="2"/>
  <text x="775" y="530" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">Python RAG 执行端</text>
  <text x="775" y="550" font-size="10" text-anchor="middle" fill="#6b7280">(解析/向量/产物)</text>
  <text x="775" y="565" font-size="10" text-anchor="middle" fill="#6b7280">（系统边界）</text>
  <rect x="900" y="500" width="120" height="80" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="960" y="530" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">前端</text>
  <text x="960" y="550" font-size="10" text-anchor="middle" fill="#6b7280">REST / SSE / WS</text>
  <text x="960" y="565" font-size="10" text-anchor="middle" fill="#6b7280">（用户端）</text>
  <line x1="680" y1="480" x2="680" y2="900" stroke="#ea580c" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="680" y="470" font-size="11" font-weight="600" fill="#ea580c">Java 侧 | Python 侧</text>
  <text x="50" y="620" font-size="13" font-weight="600" fill="#111827">主链路：文件上传 → 解析 → SSE 回传</text>
  <rect x="60" y="650" width="90" height="50" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="105" y="682" font-size="11" text-anchor="middle" fill="#111827">1. 前端上传</text>
  <rect x="160" y="650" width="90" height="50" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="205" y="682" font-size="11" text-anchor="middle" fill="#111827">2. Controller</text>
  <rect x="260" y="650" width="90" height="50" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="305" y="682" font-size="11" text-anchor="middle" fill="#111827">3. OSS</text>
  <rect x="360" y="650" width="90" height="50" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="405" y="682" font-size="11" text-anchor="middle" fill="#111827">4. ParseTaskMQ</text>
  <rect x="460" y="650" width="90" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="505" y="682" font-size="11" text-anchor="middle" fill="#111827">5. Python解析</text>
  <rect x="560" y="650" width="90" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="605" y="682" font-size="11" text-anchor="middle" fill="#111827">6. 写Markdown</text>
  <rect x="660" y="650" width="90" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="705" y="682" font-size="11" text-anchor="middle" fill="#111827">7. ResultMQ</text>
  <rect x="760" y="650" width="90" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="805" y="682" font-size="11" text-anchor="middle" fill="#111827">8. SSE推送</text>
  <rect x="860" y="650" width="90" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="905" y="682" font-size="11" text-anchor="middle" fill="#111827">9. 前端展示</text>
  <line x1="150" y1="675" x2="160" y2="675" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="250" y1="675" x2="260" y2="675" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="350" y1="675" x2="360" y2="675" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="450" y1="675" x2="460" y2="675" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="550" y1="675" x2="560" y2="675" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="650" y1="675" x2="660" y2="675" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="750" y1="675" x2="760" y2="675" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="850" y1="675" x2="860" y2="675" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="50" y="750" font-size="13" font-weight="600" fill="#111827">缓存与补偿：Redis 读保护 + CacheCompensationMQ 兜底</text>
  <rect x="60" y="770" width="140" height="50" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="130" y="800" font-size="12" text-anchor="middle" fill="#111827">Redis 缓存读</text>
  <line x1="200" y1="795" x2="260" y2="795" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="230" y="790" font-size="10" text-anchor="middle" fill="#6b7280">hit/miss</text>
  <rect x="260" y="770" width="140" height="50" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="330" y="800" font-size="12" text-anchor="middle" fill="#111827">DB 回源/缓存</text>
  <line x1="400" y1="795" x2="460" y2="795" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="430" y="790" font-size="10" text-anchor="middle" fill="#6b7280">补偿</text>
  <rect x="460" y="770" width="140" height="50" rx="6" fill="#ede9fe" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="530" y="800" font-size="12" text-anchor="middle" fill="#111827">CacheCompensationMQ</text>
  <line x1="600" y1="795" x2="660" y2="795" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="630" y="790" font-size="10" text-anchor="middle" fill="#6b7280">evict</text>
  <rect x="660" y="770" width="140" height="50" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="730" y="800" font-size="12" text-anchor="middle" fill="#111827">Redis 删除</text>
  <text x="50" y="870" font-size="13" font-weight="600" fill="#111827">Java 与 Python 协作边界</text>
  <rect x="60" y="890" width="300" height="80" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="210" y="915" font-size="12" font-weight="600" text-anchor="middle" fill="#111827">Java 侧职责</text>
  <text x="70" y="935" font-size="11" fill="#6b7280">• 投递解析任务到 Kafka</text>
  <text x="70" y="955" font-size="11" fill="#6b7280">• 消费解析结果、转发 SSE</text>
  <rect x="400" y="890" width="300" height="80" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="550" y="915" font-size="12" font-weight="600" text-anchor="middle" fill="#111827">Python 侧职责</text>
  <text x="410" y="935" font-size="11" fill="#6b7280">• 消费任务、执行解析</text>
  <text x="410" y="955" font-size="11" fill="#6b7280">• 写 Markdown + 向量、发结果</text>
  <rect x="740" y="890" width="300" height="80" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="890" y="915" font-size="12" font-weight="600" text-anchor="middle" fill="#111827">共享资源</text>
  <text x="750" y="935" font-size="11" fill="#6b7280">• MySQL（权威源）、Kafka（MQ）</text>
  <text x="750" y="955" font-size="11" fill="#6b7280">• MinIO 桶：tolink-rag-docs</text>
  <g transform="translate(50, 1000)">
    <text x="0" y="0" font-size="12" font-weight="600" fill="#111827">图例：</text>
    <line x1="0" y1="15" x2="30" y2="15" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <text x="36" y="19" font-size="11" fill="#6b7280">同步/请求流</text>
    <line x1="180" y1="15" x2="210" y2="15" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <text x="216" y="19" font-size="11" fill="#6b7280">异步/MQ 消息</text>
    <line x1="360" y1="15" x2="390" y2="15" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
    <text x="396" y="19" font-size="11" fill="#6b7280">补偿/兜底</text>
  </g>
  <text x="1100" y="620" font-size="12" font-weight="600" fill="#111827">关键组件说明</text>
  <rect x="1080" y="635" width="300" height="330" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="1095" y="660" font-size="11" font-weight="600" fill="#111827">link-api</text>
  <text x="1095" y="678" font-size="10" fill="#6b7280">REST/SSE 网关，15 个 Controller</text>
  <text x="1095" y="690" font-size="11" font-weight="600" fill="#111827">link-service</text>
  <text x="1095" y="708" font-size="10" fill="#6b7280">业务编排，组合 mapper/组件</text>
  <text x="1095" y="720" font-size="11" font-weight="600" fill="#111827">link-mapper</text>
  <text x="1095" y="738" font-size="10" fill="#6b7280">MyBatis-Plus 数据访问层</text>
  <text x="1095" y="750" font-size="11" font-weight="600" fill="#111827">link-components</text>
  <text x="1095" y="768" font-size="10" fill="#6b7280">mq / oss / redis 三子模块</text>
  <text x="1095" y="780" font-size="11" font-weight="600" fill="#111827">DocumentParseTaskMQ</text>
  <text x="1095" y="798" font-size="10" fill="#6b7280">Java → Python（解析任务）</text>
  <text x="1095" y="810" font-size="11" font-weight="600" fill="#111827">DocumentParseResultMQ</text>
  <text x="1095" y="828" font-size="10" fill="#6b7280">Python → Java（结果回传）</text>
  <text x="1095" y="840" font-size="11" font-weight="600" fill="#111827">DocumentDeleteNotifyMQ</text>
  <text x="1095" y="858" font-size="10" fill="#6b7280">Java → Python（删除通知）</text>
  <text x="1095" y="870" font-size="11" font-weight="600" fill="#111827">CacheCompensationMQ</text>
  <text x="1095" y="888" font-size="10" fill="#6b7280">缓存补偿（最终一致性）</text>
</svg>