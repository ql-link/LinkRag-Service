# 部署用 compose：拉取 Jenkins 推送的镜像并启动 Java 管理端
# 用法：REGISTRY=xxx TAG=xxx docker compose -f deploy/docker-compose.yml up -d
services:
  tolink-service:
    image: ${REGISTRY:-local}/tolink-service:${TAG:-latest}
    container_name: tolink-service
    restart: always
    env_file:
      - ../.env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
    ports:
      - "8080:8080"
